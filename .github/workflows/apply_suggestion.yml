name: Apply Slack Suggestion

on:
  workflow_dispatch:
    inputs:
      cid:
        description: 'GHL contact ID (the lead this update belongs to)'
        required: true
        type: string
      field_updates:
        description: 'JSON object: {asking_price: ..., timeline: ..., motivation: ..., reason_for_selling: ...}'
        required: true
        type: string

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Apply suggestion to GHL
        env:
          GHL_TOKEN:     ${{ secrets.GHL_TOKEN }}
          CID:           ${{ inputs.cid }}
          FIELD_UPDATES: ${{ inputs.field_updates }}
        run: python apply_suggestion.py
