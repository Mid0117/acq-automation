name: ACQ SMS Follow-Up + Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:

permissions:
  contents: write    # needed to push to gh-pages branch

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache SMS state
        uses: actions/cache@v4
        with:
          path: sms_state.json
          key: sms-state-${{ github.ref }}
          restore-keys: sms-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send SMS follow-ups
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          DASHBOARD_SHEET_ID: ${{ secrets.DASHBOARD_SHEET_ID }}
        run: python sms_followup.py

      - name: Update Google Sheet dashboard
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DASHBOARD_SHEET_ID: ${{ secrets.DASHBOARD_SHEET_ID }}
        run: python dashboard.py

      - name: Generate HTML dashboard
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          DASHBOARD_SHEET_ID: ${{ secrets.DASHBOARD_SHEET_ID }}
        run: python dashboard_html.py

      - name: Deploy HTML dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'Auto: dashboard refresh'
