name: ACQ Call Recording Automation

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger from GitHub UI
    inputs:
      backfill_recompute:
        description: 'Re-analyze ARV for ALL stage 1-4 leads (ignore existing ARV). Costs ~$1.50/lead.'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      backfill_cap:
        description: 'Max leads to backfill in this run (default 15).'
        required: false
        default: '15'
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache processed contacts
        uses: actions/cache@v4
        with:
          path: processed_contacts.json
          key: processed-${{ github.ref }}
          restore-keys: processed-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run automation
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          DG_KEY: ${{ secrets.DG_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BACKFILL_RECOMPUTE: ${{ inputs.backfill_recompute || 'false' }}
          BACKFILL_CAP_PER_RUN: ${{ inputs.backfill_cap || '15' }}
        run: python acq_automation.py
