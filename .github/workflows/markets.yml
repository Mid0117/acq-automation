name: Market Analysis Refresh

on:
  schedule:
    # Sundays 09:00 UTC = 04:00 ET — weekly refresh of state rankings.
    # Free public CSVs (Realtor.com Research, Zillow Research) update
    # monthly so this is plenty.
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build market analysis
        run: python market_analysis.py

      - name: Commit markets.json to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "Markets Bot"
          git config user.email "markets-bot@users.noreply.github.com"
          git add site/markets.json
          if git diff --staged --quiet; then
            echo "No changes to markets.json"
            exit 0
          fi
          git commit -m "Markets: weekly refresh $(date -u +%Y-%m-%d)"
          # Retry-on-race: if main moved while we were running, pull-rebase and retry.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Push race — pulling and retrying ($i/5)…"
            git pull --rebase origin main || true
          done
          echo "::error::Push failed after 5 retries"
          exit 1
