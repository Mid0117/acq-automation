name: APG Slack Scraper

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

permissions:
  contents: write   # commit slack_users.json so weekly can resolve names

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Slack state
        uses: actions/cache@v4
        with:
          path: slack_state.json
          key: slack-state-${{ github.ref }}
          restore-keys: slack-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan Slack for lead mentions
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python slack_scraper.py

      - name: Commit slack_users.json to main
        run: |
          git config user.name  "apg-slack-bot"
          git config user.email "apg-slack-bot@users.noreply.github.com"
          git add slack_users.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new user-name mappings to commit."
            exit 0
          fi
          git commit -m "Slack: cache user names $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry-on-race: any other workflow may have pushed during scan
          for i in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i/5), rebasing..."
            git pull --rebase origin main || true
            sleep 3
          done
          echo "Failed to push slack_users.json after 5 retries"
          exit 0  # don't fail the whole workflow over the user cache
