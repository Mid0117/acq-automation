name: Weekly Analysis

on:
  schedule:
    - cron: '0 14 * * 5'   # Every Friday 14:00 UTC ≈ 10 AM ET (EDT). Drifts to 9 AM ET in EST.
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # commit weekly outputs back to main

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly analysis
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
        run: python weekly_analysis.py

      - name: Commit outputs to main
        run: |
          git config user.name  "apg-weekly-bot"
          git config user.email "apg-weekly-bot@users.noreply.github.com"
          git add weekly/ site/weekly.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Weekly Analysis snapshot $(date -u +%Y-W%V)"
          # Retry-on-race: another workflow may have pushed while we were
          # generating the snapshot. Rebase on top, push, repeat up to 5x.
          for i in 1 2 3 4 5; do
            if git push 2>&1; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i/5), rebasing..."
            git pull --rebase origin main || true
            sleep 3
          done
          echo "Failed to push after 5 retries"
          exit 1
